<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AutoMod</title>
        <link rel="stylesheet" href="../src/CSS/login.css">
        <link rel="icon" href="../src/img/logo-AutoMod.webp">
    </head>
    <body>
        <section id="login" class="display-flex">
            <div class="title">
                <img class="logo-automod" src="../src/img/logo-AutoMod.webp" alt="AutoMod">
                <p>ورود</p>
            </div>
            <div class="input"> 
                <input type="tel" name="tel-number" id="tel-login" autocomplete="tel" required pattern="[0-9]{11}" placeholder="">
                <label for="tel-login" class="label-login">شماره موبایل</label>
            </div>
            <div class="submit">
                <button type="submit" class="btn-submit goTo-code1"><a
                        href="#information-user" class="home">ورود</a></button>
                <p> حساب کاربری ندارید؟<a href="#sign-up" id="goTo-sign"> ایجاد
                        حساب</a></p>
            </div>
        </section>
        <section id="sign-up" class="display-none">
            <div class="title">
                <img class="logo-automod" src="../src/img/logo-AutoMod.webp" alt="AutoMod">
                <p>ثبت نام</p>
            </div>
            <div class="input">
                <input type="tel" name="tel-number" id="tel-sign" autocomplete="tel" required minlength="11" maxlength="11" placeholder="">
                <label for="tel-sign" class="label-login">شماره موبایل</label>
            </div>
            <div class="submit">
                <button type="submit" class="btn-submit goTo-code2">ثبت
                    نام</button>
                <p>حساب کاربری دارید؟ <a href="#login"
                        id="goTo-login">ورود</a></p>
            </div>
        </section>
        <section id="code" class="display-none">
            <div class="title">
                <img class="logo-automod" src="../src/img/logo-AutoMod.webp" alt="AutoMod">
                <p>اعتبار سنجی</p>
            </div>
            <div class="input">
                <input type="number" name="code-number" id="code-number" required placeholder="">
                <label for="code-number" class="label-login">کد را وارد
                    کنید</label>
            </div>
            <div class="submit">
                <p class="code-timer">کد به شماره شما ارسال شد
                    <br>
                    اگر آن را دریافت نکردید تا ارسال مجدد:
                    <span id="countdown" class="codeTimer-count">2:00</span>
                    <a href="#" id="resendLink"
                        class="codeTimer-resend display-none"
                        onclick="event.pereventDefault(); resendCode();">ارسال
                        مجدد 
                    </a>
                </p>
                <button type="button" class="btn-submit"><a
                        href="#information-user" id="goTo-informationUser">تایید
                        کد</a></button>
            </div>
        </section>
        <section id="information-user" class="display-none">
            <div class="title">
                <img class="logo-automod" src="../src/img/logo-AutoMod.webp" alt="Ayromod">
                <p class="p-information">تکمیل اطلاعات</p>
            </div>
            <div class="input">
                <input type="text" name="first-name" id="firstName-user" required placeholder="">
                <label for="code-number" class="label-input">نام خود را وارد کنید</label>
            </div>
            <div class="input">
                <input type="text" name="last-name" id="lastName-user" required placeholder=" ">
                <label for="code-number" class="label-input2">نام خانوادگی خود را وارد کنید</label>
            </div>
            <div class="submit">
                <button type="submit"  class="btn-submit goTo-home"><a href="../index.html" class="home" >تایید اطلاعات</a></button>
            </div>
        </section>
        <script src="../src/JS/login.js"></script>
    </body>
</html>
